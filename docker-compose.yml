# Local PostgreSQL for development.
# Start with: docker compose up -d
# Matches the default DATABASE_URL in .env.example.
services:
  db:
    image: postgres:16-alpine
    container_name: finance_tracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - finance_tracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  finance_tracker_pgdata:
